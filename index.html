<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XIAO WU MD - ULTIMATE EXPERIENCE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #050505;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 🎬 Background Video */
        .bg-video {
            position: fixed;
            right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            z-index: -2;
            object-fit: cover;
            opacity: 0.35;
        }

        /* ✨ Interactive Particles Canvas */
        #particles-js {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* 🏯 Main UI Box */
        .container {
            background: rgba(10, 10, 15, 0.85);
            padding: 40px 30px;
            border-radius: 30px;
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 0, 127, 0.3);
            box-shadow: 0 0 40px rgba(255, 0, 127, 0.2);
            max-width: 440px; width: 90%;
            text-align: center;
            z-index: 10;
        }

        /* 🐰 Xiao Wu Profile Photo */
        .bot-logo {
            width: 120px; height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ff007f;
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.7);
            margin-bottom: 10px;
            transition: 0.5s;
        }

        /* 💬 Dialogue Bubble */
        .dialogue-box {
            background: rgba(255, 0, 127, 0.15);
            border: 1px solid #ff007f;
            border-radius: 15px;
            padding: 12px 18px;
            font-size: 14px;
            color: #ffccff;
            margin-bottom: 25px;
            font-style: italic;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.4;
            box-shadow: inset 0 0 10px rgba(255, 0, 127, 0.2);
            animation: fadeIn 0.5s ease-in;
        }

        /* 🌟 XIAO WU Glowing Title */
        h1 {
            font-family: 'Cinzel', serif;
            font-size: 38px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 10px #ff007f, 0 0 20px #ff007f, 0 0 40px #ff007f;
            animation: glowPulse 2s infinite alternate;
        }

        @keyframes glowPulse {
            from { text-shadow: 0 0 10px #ff007f, 0 0 20px #ff007f; }
            to { text-shadow: 0 0 15px #fff, 0 0 30px #ff00ff, 0 0 50px #ff00ff; }
        }

        .subtitle { font-size: 11px; color: #ff99cc; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 30px; }

        input[type="text"] {
            width: 100%; padding: 16px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(255, 0, 127, 0.3);
            border-radius: 15px;
            color: white; font-size: 16px;
            text-align: center; outline: none; transition: 0.3s;
        }
        input[type="text"]:focus { border-color: #ff007f; box-shadow: 0 0 15px rgba(255, 0, 127, 0.4); }

        /* ⚔️ ULTIMATE SPIRIT BIND BUTTON ⚔️ */
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #ff007f, #ff00ff);
            color: white; border: none;
            padding: 15px 25px;
            font-family: 'Orbitron', sans-serif;
            font-size: 18px; font-weight: 700;
            border-radius: 18px; cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 0, 127, 0.5);
            margin-top: 20px;
            display: flex; align-items: center; justify-content: center; gap: 15px;
            transition: 0.4s;
            letter-spacing: 2px;
        }
        .submit-btn:hover { transform: scale(1.03); box-shadow: 0 8px 25px rgba(255, 0, 127, 0.8); }
        .submit-btn:active { transform: scale(0.98); }

        .btn-icon {
            width: 38px; height: 38px;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 0 10px white;
            transition: 0.6s;
            object-fit: cover;
        }
        .submit-btn:hover .btn-icon { transform: rotate(360deg); }

        /* 📊 Neon Progress Bar & Percentage */
        .progress-container {
            width: 100%; height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px; margin-top: 25px;
            display: none; position: relative; overflow: hidden;
        }
        .progress-bar {
            width: 0%; height: 100%;
            background: #ff007f;
            box-shadow: 0 0 15px #ff007f, 0 0 30px #ff007f;
            transition: width 0.05s linear;
        }
        /* 🔢 ඔන්න Neon විදිහට ඉලක්කම් පේන කොටස හැදුවා */
        .percentage-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            color: #ff007f;
            text-shadow: 0 0 10px #ff007f;
            margin-top: 15px;
            display: none;
            font-weight: bold;
        }

        /* 📟 Code Container */
        .code-container {
            margin-top: 25px; padding: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px dashed #ff007f;
            border-radius: 15px; display: none;
            animation: slideUp 0.5s ease-out;
        }
        .pairing-code { font-size: 28px; font-weight: 900; letter-spacing: 5px; color: #fff; text-shadow: 0 0 10px #ff007f; }

        /* 🔊 Audio Controls */
        .audio-controls {
            margin-top: 30px; background: rgba(255, 255, 255, 0.05);
            padding: 12px 20px; border-radius: 15px;
            display: flex; align-items: center; justify-content: space-between;
            border: 1px solid rgba(255, 0, 127, 0.2);
        }
        .mute-btn { background: #ff007f; color: white; border: none; padding: 8px 16px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .volume-slider { width: 60%; accent-color: #ff007f; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <video loop playsinline class="bg-video" id="bgVideo">
        <source src="https://github.com/b4kgaming1223-collab/Queen-Nethu-MD-side-/raw/refs/heads/main/VID-20260505-WA0004.mp4" type="video/mp4">
    </video>

    <canvas id="particles-js"></canvas>

    <div class="container">
        <img src="https://raw.githubusercontent.com/b4kgaming1223-collab/Queen-Nethu-MD-side-/refs/heads/main/IMG-20260524-WA0115.jpg" id="mainLogo" alt="Xiao Wu" class="bot-logo">

        <div class="dialogue-box" id="dialogue">"Welcome, Spirit Master! Connect your essence to XIAO WU MD..."</div>

        <h1>XIAO WU</h1>
        <div class="subtitle">Ultimate WhatsApp Spirit</div>

        <div style="text-align: left;">
            <label style="font-size: 13px; color: #ccc; margin-left: 5px;">Enter Spirit Number:</label>
            <input type="text" id="phone" value="+94" placeholder="+947XXXXXXXX">
            
            <button class="submit-btn" id="bindBtn" onclick="startSpiritBind()">
                <img src="https://raw.githubusercontent.com/b4kgaming1223-collab/Queen-Nethu-MD-side-/refs/heads/main/IMG-20260524-WA0115.jpg" class="btn-icon" id="btnIcon">
                <span>SPIRIT BIND...</span>
            </button>
        </div>

        <div class="progress-container" id="progCont">
            <div class="progress-bar" id="progBar"></div>
        </div>
        <div class="percentage-text" id="percText">0%</div>

        <div class="code-container" id="codeBox">
            <div style="font-size: 11px; color: #ff007f; margin-bottom: 5px;">SOUL CONNECTION ESTABLISHED</div>
            <span class="pairing-code" id="pairCode">WUSH-7A9B</span><br><br>
            <button class="mute-btn" style="width: 100%;" onclick="copyCode()">COPY SOUL BIND</button>
        </div>

        <div class="audio-controls">
            <button class="mute-btn" id="muteBtn" onclick="toggleMute()">Mute</button>
            <input type="range" class="volume-slider" min="0" max="1" step="0.1" value="0.5" oninput="changeVolume(this.value)">
        </div>
    </div>

    <script>
        var video = document.getElementById('bgVideo');
        var diag = document.getElementById('dialogue');
        var progCont = document.getElementById('progCont');
        var progBar = document.getElementById('progBar');
        var percText = document.getElementById('percText');
        var codeBox = document.getElementById('codeBox');
        var bindBtn = document.getElementById('bindBtn');

        document.addEventListener('click', function() {
            video.muted = false; video.volume = 0.5;
            video.play().catch(e => console.log(e));
        }, { once: true });

        // ⚔️ Spirit Bind සහ 100% Loading සිස්ටම් එක
        function startSpiritBind() {
            var phone = document.getElementById('phone').value.trim();
            if (phone === "" || phone === "+94") {
                diag.innerText = "\"Please enter a valid number, Master!\"";
                return;
            }

            bindBtn.style.opacity = "0.5";
            bindBtn.disabled = true;
            progCont.style.display = "block";
            percText.style.display = "block"; // ඉලක්කම පෙන්වන්න පටන් ගන්නවා
            
            diag.innerText = "\"Gathering Soul Power... Gathering Spirit Rings... 💫\"";

            let width = 0;
            let barInterval = setInterval(function() {
                if (width >= 100) {
                    clearInterval(barInterval);
                    percText.innerText = "100%"; // අන්තිමටම 100% වදිනවා
                    
                    diag.innerText = "\"Injecting Xiao Wu's Spirit Energy... Please wait... 🔥\"";

                    setTimeout(() => {
                        diag.innerText = "\"Spirit Connection Established! Claim your code now, Master! 🐰🌸\"";
                        codeBox.style.display = "block";
                        bindBtn.style.display = "none";
                        progCont.style.display = "none";
                        percText.style.display = "none"; // කෝඩ් එක ආවාම ඉලක්කම අයින් කරනවා
                    }, 1200);
                } else {
                    width += 1; // 1න් 1 ලස්සනට ඉලක්කම් ටික වැඩිවෙන්න හැදුවා
                    progBar.style.width = width + "%";
                    percText.innerText = width + "%"; // ඉලක්කම අප්ඩේට් වෙනවා
                    
                    if(width == 50) {
                        diag.innerText = "\"Awakening Martial Soul... Connecting to WhatsApp Network... ⚡\"";
                    }
                }
            }, 40); // පිරෙන වේගය වෙනස් කරන්න පුළුවන්
        }

        function copyCode() {
            var text = document.getElementById('pairCode').innerText;
            navigator.clipboard.writeText(text).then(() => {
                diag.innerText = "\"Xiao Wu's Promise is copied to your clipboard! 🤝💖\"";
            });
        }

        function toggleMute() {
            video.muted = !video.muted;
            document.getElementById('muteBtn').innerText = video.muted ? "Unmute" : "Mute";
        }

        function changeVolume(v) { video.volume = v; }

        // ✨ Vanilla JS Particles Engine
        const canvas = document.getElementById('particles-js');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.size > 0.2) this.size -= 0.01;
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 0, 127, 0.8)';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }
        function handleParticles() {
            for (let i = 0; i < particles.length; i++) {
                particles[i].update(); particles[i].draw();
                if (particles[i].size <= 0.2) { particles.splice(i, 1); i--; }
            }
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (particles.length < 50) particles.push(new Particle());
            handleParticles(); requestAnimationFrame(animate);
        }
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        animate();
    </script>
</body>
</html>
